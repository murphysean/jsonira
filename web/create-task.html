<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Mrfy.io Task Creator</title>
        <meta charset="UTF-8">
        <style>
            .hidden-button {
                visibility: hidden;
            }
        </style>
    </head>
    <body>
        <datalist id="circles">
            <option value="public">Public</option>
            <option value="mrfy-family">Murphy Family</option>
        </datalist>
        <datalist id="users">
            <option data-id="1" data-email="sean@example.com" data-name="Sean Murphy" value="Sean Murphy">Sean Murphy</option>
            <option data-id="2" data-email="child1@example.com" data-name="Child One" value="Child One">Child One</option>
            <option data-id="3" data-email="child2@example.com" data-name="Child Two" value="Child Two">Child Two</option>
            <option data-id="4" data-email="child3@example.com" data-name="Child Three" value="Child Three">Child Three</option>
        </datalist>
        <datalist id="priorities">
            <option data-priority="neutral" value="neutral">Neutral</option>
            <option data-priority="trivial" value="trivial">Trivial</option>
            <option data-priority="minor" value="minor">Minor</option>
            <option data-priority="major" value="major">Major</option>
            <option data-priority="critical" value="critical">Critical</option>
            <option data-priority="blocker" value="blocker">Blocker</option>
        </datalist>
        <datalist id="states">
            <option data-state="blocked" data-reason="waiting-on-other" value="Blocked (Waiting on Other)">Blocked (Waiting on Other)</option>
            <option data-state="blocked" data-reason="needs-information" value="Blocked (Needs Information)">Blocked (Needs Information)</option>
            <option data-state="blocked" data-reason="needs-planning" value="Blocked (Needs Planning)">Blocked (Needs Planning)</option>
            <option data-state="blocked" data-reason="needs-materials" value="Blocked (Needs Materials)">Blocked (Needs Materials)</option>
            <option data-state="blocked" data-reason="needs-tools" value="Blocked (Needs Tools)">Blocked (Needs Tools)</option>
            <option data-state="blocked" data-reason="insufficient-budget" value="Blocked (Insufficient Budget)">Blocked (Insufficient Budget)</option>
            <option data-state="blocked" data-reason="required-authorization" value="Blocked (Requires Authorization)">Blocked (Requires Authorization)</option>
            <option data-state="todo" value="Todo">Todo</option>
            <option data-state="in-progress" value="In Progress">In Progress</option>
            <option data-state="in-review" value="In Review"></option>
            <option data-state="complete" data-resolution="done" value="Complete (Done)">Complete (Done)</option>
            <option data-state="complete" data-resolution="nothing-to-do" value="Complete (Nothing to do)">Complete (Nothing to do)</option>
            <option data-state="complete" data-resolution="wont-do" value="Complete (Wont Do)">Complete (Won't Do)</option>
            <option data-state="complete" data-resolution="cancelled" value="Complete (Cancelled)">Complete (Cancelled)</option>
            <option data-state="complete" data-resolution="duplicate" value="Complete (Duplicate)">Complete (Duplicate)</option>
            <option data-state="complete" data-resolution="closed-for-age" value="Complete (Closed for Age)">Complete (Closed for Age)</option>
        </datalist>
        <!-- This is the task form -->
        <section id="details">
            <div>
                <label for="title">Title:</label>
                <input type="text" id="title" name="title" value=""/>
                <input id="update-title-button" class="update-button" type="button" value="Update" onclick="update_title_from_input()"/>
            </div>
            <div>
                <label>Reporter:</label>
                <span id="reporter"></span>
            </div>
            <div>
                <label for="watchers">Watchers:</label>
                <form id="watchers">
                </form>
                <label for="watcher">Add Watcher:</label>
                <input type="text" id="watcher" name="watcher" list="users"/>
                <input id="add-watcher-button" class="add-button" type="button" value="Add Watcher" onclick="add_watcher_from_input()"/>
            </div>
            <div>
                <label for="circle">Circle:</label>
                <input type="text" id="circle" name="circle" list="circles" value="">
                <input id="update-circle-button" class="update-button" type="button" value="Update" onclick="update_circle_from_input()"/>
            </div>
            <div>
                <label for="assignee">Assignee:</label>
                <input type="text" id="assignee" name="assignee" list="users" value=""/>
                <input id="update-assignee-button" class="update-button" type="button" value="Update" onclick="update_assignee_from_input()"/>
            </div>
            <div>
                <label for="priority">Priority:</label>
                <input type="text" id="priority" name="priority" list="priorities" value=""/>
                <input id="update-priority-button" class="update-button" type="button" value="Update" onclick="update_priority_from_input()"/>
            </div>
            <div>
                <label for="estimate">Estimate (8601 time span... P1y2m3dT4h5m6s):</label>
                <input type="text" id="estimate" name="estimate" value=""/>
                <input id="update-estimate-button" class="update-button" type="button" value="Update" onclick="update_estimate_from_input()"/>
            </div>
            <div>
                <label for="points">Points:</label>
                <input type="text" id="points" name="points" value=""/>
                <input id="update-points-button" class="update-button" type="button" value="Update" onclick="update_points_from_input()"/>
            </div>
            <div>
                <label for="state">State:</label>
                <input type="text" id="state" name="state" list="states" value=""/>
                <input id="update-state-button" class="update-button" type="button" value="Update" onclick="update_state_from_input()"/>
            </div>
            <div>
                <label for="tags">Tags:</label>
                <form id="tags">
                </form>
                <label for="tag">Add Tag:</label>
                <input type="text" id="tag" name="tag"/>
                <input id="add-tag-button" class="add-button" type="button" value="Add Tag" onclick="add_tag_from_input()"/>
            </div>
            <div>Created: <span id="created"></span></div>
            <div>Updated: <span id="updated"></span></div>
            <div>
                <label for="due">Due:</label>
                <input type="date" id="due" name="due" value=""/>
                <input id="update-due-button" class="update-button" type="button" value="Update" onclick="update_due_from_input()"/>
            </div>
        </section>
        <section>
            <label for="description">Description:</label>
            <textarea id="description" name="description" rows="16" cols="60"></textarea>
            <input id="update-description-button" class="update-button" type="button" value="Update" onclick="update_description_from_input()">
        </section>
        <section>
            <section id="comments">
            </section>
            <label for="comment">Add Comment:</label>
            <input id="comment" type="text">
            <input id="add-comment-button" class="add-button" type="button" value="Add Comment" onclick="add_comment_from_input()"/>
        </section>
        <p>Reactions: TODO</p>
        <p>Reviews: TODO</p>
        <section id="history">
            <article id="hitory-1">
                <div>Updates by NAME on DATE</div>
            </article>
        </section>
        <nav>
            <form>
                <label for="get-script-input">Load Script File:</label>
                <input id="get-script-input" type="file" accept=".json,.yaml,application/json,text/vnd.yaml">
                <input id="get-script-button" type="button" value="Create Task Batch" onclick="load_script()">
            </form>
            <p>Create Weekly Tasks</p>
            <p>Create Daily Tasks</p>
            <form>
                <label for="get-task-input">Load Task Id:</label>
                <input id="get-task-input" type="text" value=""/>
                <input id="get-task-button" type="button" value="Get Task" onclick="get_task(document.getElementById('get-task-input').value)"/>
            </form>
            <input id="create-new-task-button" type="button" value="Create New Task" onclick="create_task()"/>
            <input id="reset-button" type="button" value="Reset Task" onclick="reset_view()"/>
        </nav>
    </body>
    <script src="task.js"></script>
    <script>
        for (e of document.getElementsByClassName("update-button")) {e.className += " hidden-button"}
    </script>
</html>
