<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Mrfy.io</title>
        <meta charset="UTF-8">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

        <style type="text/css">
            div#login{
                display:none;
            }
        </style>
        <script src="index.js"></script>
    </head>
    <body onload="on_load()">
        <h1>Welcome to Mrfy.io</h1>
        <div id="login" display="none">
            <form action="/login" method="post">
            <label for="username">username:</label><br>
            <input type="text" id="username" name="username" placeholder="Enter Username" required/><br>
            <label for="password">password:</label><br>
            <input type="password" id="password" name="password" placeholder="Enter Password" required/><br><br>
            <button type="submit">Login</button>
            <label>
                <input type="checkbox" checked="checked" name="remember"/> Remember me
            </label>
            </form>
        </div>
        <nav>
            <p><a href="/board.html?tag=week-51">Current Sprint Board for WEEK 51</a></p>
        </nav>
        <section>
            <article>Once you've logged in I'd encourage you to check out my <a href="/board.html">task</a> system. It's a family sprint system.</article>
        </section>
    </body>
</html>
